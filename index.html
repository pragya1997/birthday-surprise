<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday My Love ❤️</title>
  <link rel="stylesheet" href="css/landing.css" />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- Animated gradient background -->
  <div class="bg-gradient"></div>

  <!-- Floating petals container -->
  <div class="petals-container" id="petalsContainer"></div>

  <!-- Sparkles container -->
  <div class="sparkles-container" id="sparklesContainer"></div>

  <!-- Main content -->
  <main class="landing-main">

    <div class="top-decoration">
      <span class="deco-line"></span>
      <span class="deco-heart">♡</span>
      <span class="deco-line"></span>
    </div>

    <p class="pre-title">for my dearest</p>

    <!-- ✏️ REPLACE: Change the name below -->
    <h1 class="main-title">
      <span class="title-line1">Happy Birthday</span>
      <span class="title-line2">My Love ❤️</span>
    </h1>

    <!-- ✏️ REPLACE: Change the subtitle message below -->
    <p class="subtitle">
      Every moment with you is a gift I never want to stop unwrapping.<br/>
      <em>Today, the universe celebrates you — and so do I.</em>
    </p>

    <div class="divider">
      <span>✦</span><span>✦</span><span>✦</span>
    </div>

    <!-- ✏️ REPLACE: Change the date of birthday below -->
    <p class="date-badge">
      <span class="date-icon">🗓</span>
      <span id="birthdayDate">April 14th &nbsp;·&nbsp; Your Special Day</span>
    </p>

    <button class="surprise-btn" onclick="openSurprise()">
      <span class="btn-glow"></span>
      <span class="btn-text">✨ Open Your Surprise ✨</span>
    </button>

    <p class="hint-text">prepared with all my love ♡</p>

  </main>

  <!-- Floating hearts overlay -->
  <div class="hearts-overlay" id="heartsOverlay"></div>

  <!-- Page transition overlay -->
  <div class="transition-overlay" id="transitionOverlay"></div>

  <script src="js/landing.js"></script>
</body>
</html>
