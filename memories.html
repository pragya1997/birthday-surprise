<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Memories 📸</title>
  <link rel="stylesheet" href="css/final.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="bg-final"></div>
  <div class="petals-final" id="petalsFinal"></div>

  <!-- ✏️ Drop your song in audio/ and update the src below -->
  <audio id="bgMusic" loop>
    <source src="audio/Pehli Nazar Mein Race 320 Kbps.mp3" type="audio/mpeg"/>
  </audio>

  <a href="landing.html" class="back-link">← Back</a>

  <button class="music-toggle" id="musicToggle" title="Toggle music">🎵</button>

  <main class="final-main">

    <div class="final-title-area">
      <span class="star-deco">✨</span>
      <!-- ✏️ Change heading if you want -->
      <h1 class="final-heading">Our Memories, <span class="final-name">Together ❤️</span></h1>
      <span class="star-deco">✨</span>
    </div>

    <!-- ✏️ Edit photos/videos in js/memories.config.js -->
    <div class="memories-layout">
      <div class="slideshow-wrap">
        <div class="slideshow" id="slideshow"></div>
        <div class="slide-dots" id="slideDots"></div>
      </div>
      <div class="slide-caption-side">
        <span class="caption-deco">❝</span>
        <p id="slideOverlay" class="slide-caption-text"></p>
      </div>
    </div>

  </main>

  <script src="js/memories.config.js"></script>
  <script src="js/memories-page.js"></script>
</body>
</html>
