<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Final Surprise 🎁</title>
  <link rel="stylesheet" href="css/final.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
</head>
<body>

  <canvas id="confettiCanvas"></canvas>
  <div class="bg-final"></div>
  <div class="petals-final" id="petalsFinal"></div>

  <!-- ✏️ Drop your song in the audio/ folder and update the src below -->
  <audio id="bgMusic" loop autoplay>
    <source src="audio/music.mp3" type="audio/mpeg"/>
  </audio>

  <a href="landing.html" class="back-link">← Back</a>

  <main class="final-main">

    <div class="final-title-area">
      <span class="star-deco">✨</span>
      <!-- ✏️ Change the name -->
      <h1 class="final-heading">Happy Birthday, <span class="final-name">My Love ❤️</span></h1>
      <span class="star-deco">✨</span>
    </div>

    <!-- ══ SLIDESHOW ══ -->
    <!-- ✏️ Edit slides in js/final.js → SLIDES array -->
    <div class="slideshow-wrap">
      <div class="slideshow" id="slideshow"></div>
      <p class="slide-overlay-text">Every moment with you became my favorite…</p>
      <div class="slide-dots" id="slideDots"></div>
    </div>

    <!-- ══ FINAL MESSAGE — fades in after OUTRO_DELAY ms ══ -->
    <div class="final-outro" id="finalOutro">
      <p class="outro-line1">I didn’t just make this for your birthday…</p>
      <p class="outro-line2">I made this because loving you feels like home ❤️</p>
      <button class="confetti-btn" onclick="fireConfetti()">🎉 Celebrate! 🎉</button>
    </div>

  </main>

  <script src="js/final.js"></script>
</body>
</html>
